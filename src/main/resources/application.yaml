spring:
  application:
    name: demo
  datasource:
    url: jdbc:mysql://localhost:3306/guanvendas
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

security:
  jwt:
    secret: "4d61747269785f4a57545f5365637265745f4b65795f466f725f47756e56656e6461735f32303235"
    access-token-expiration: 900000      # 15 min
    refresh-token-expiration: 604800000  # 7 days
